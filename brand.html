<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockPort Logo Export</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary-teal: #00c4b4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .logo-canvas {
            width: 800px;
            height: 800px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            padding: 0;
        }

        .logo-img {
            width: 500px; /* Adjusted size for better visual weight */
            height: auto;
            margin-bottom: 1.5rem;
        }

        .logo-text {
            font-size: 8rem; /* Slightly larger text */
            font-weight: 600;
            color: var(--primary-teal);
            letter-spacing: -0.02em;
            text-align: center;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="logo-canvas">
        <img src="assets/images/DPL.svg" alt="DockPort Logo" class="logo-img">
        <h1 class="logo-text">DockPort</h1>
    </div>
</body>
</html>
